name: Build and Publish Curated Feed

on:
  workflow_dispatch:
  push:
    paths:
      - pipeline/**
      - .github/workflows/publish-feed.yml
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Build curated feed
        run: |
          python pipeline/src/build_feed.py
          touch pipeline/dist/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pipeline/dist
          force_orphan: true
